<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Juniper brandmark">
  <title>Juniper brandmark</title>
  <!-- Six branches radiating from center hub -->
  <line x1="16" y1="16" x2="16" y2="5.5"      stroke="#7E9C87" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="25.09" y2="10.75"  stroke="#7E9C87" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="25.09" y2="21.25"  stroke="#7E9C87" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="16" y2="26.5"      stroke="#7E9C87" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="6.91" y2="21.25"   stroke="#7E9C87" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="6.91" y2="10.75"   stroke="#7E9C87" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Berries at each branch tip -->
  <circle cx="16"    cy="5.5"  r="2.2" fill="#C6A96A"/>
  <circle cx="25.09" cy="10.75" r="2.2" fill="#C6A96A"/>
  <circle cx="25.09" cy="21.25" r="2.2" fill="#C6A96A"/>
  <circle cx="16"    cy="26.5" r="2.2" fill="#C6A96A"/>
  <circle cx="6.91"  cy="21.25" r="2.2" fill="#C6A96A"/>
  <circle cx="6.91"  cy="10.75" r="2.2" fill="#C6A96A"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="3.5" fill="#4F6B59"/>
  <circle cx="16" cy="16" r="1.5" fill="#7E9C87" opacity="0.6"/>
</svg>
